name: detoo_chat_app
description: Detoo - Indian Chat App with 1-on-1, Group Chat, File Sharing & Calls
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.6
  firebase_messaging: ^14.7.20

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10

  # Chat & Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  video_player: ^2.8.3
  photo_view: ^0.14.0

  # Voice/Video Calling (Agora)
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.0

  # Utilities
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  country_code_picker: ^3.0.0
  emoji_picker_flutter: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
